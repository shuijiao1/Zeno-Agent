name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.12'
          check-latest: true
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test -race ./...
      - run: go vet ./...
      - name: Cross compile supported targets
        run: |
          set -euo pipefail
          for target in linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 go build -trimpath -o /tmp/zeno-agent-build ./cmd/zeno-agent
          done
