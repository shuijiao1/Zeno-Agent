name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.12'
          check-latest: true
      - name: Enforce release version and source policy
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          bash scripts/check-release-policy.sh "$GITHUB_REF_NAME" "$GITHUB_SHA" origin/main
          release_status=$(curl -sS -o /tmp/existing-release.json -w '%{http_code}' \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")
          case "$release_status" in
            404) ;;
            200) echo "release already exists for $GITHUB_REF_NAME" >&2; exit 1 ;;
            *) echo "cannot verify release uniqueness (GitHub API HTTP $release_status)" >&2; exit 1 ;;
          esac
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test -race ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Run vulnerability gate for every released operating system
        run: |
          govulncheck="$(go env GOPATH)/bin/govulncheck"
          for goos in linux darwin windows; do
            echo "govulncheck GOOS=$goos GOARCH=amd64"
            GOOS="$goos" GOARCH=amd64 "$govulncheck" ./...
          done
      - run: bash -n install.sh
      - shell: pwsh
        run: '[void][scriptblock]::Create((Get-Content -Raw install.ps1))'
      - name: Build release assets
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          version="$(tr -d '\r\n' < VERSION)"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          fi
          for target in linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            ext=""
            archive="tar.gz"
            if [ "$goos" = "windows" ]; then
              ext=".exe"
              archive="zip"
            fi
            out_dir="dist/zeno-agent_${goos}_${goarch}"
            mkdir -p "$out_dir"
            if [ "$goarch" = "arm" ]; then
              # The single linux_arm asset is consumed by both armv6l and
              # armv7l installers. GOARM=6 is the compatible contract for both.
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" GOARM=6 go build -trimpath -ldflags "-s -w -X main.defaultVersion=$version" -o "$out_dir/zeno-agent${ext}" ./cmd/zeno-agent
            else
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w -X main.defaultVersion=$version" -o "$out_dir/zeno-agent${ext}" ./cmd/zeno-agent
            fi
            if [ "$archive" = "zip" ]; then
              (cd dist && zip -qr "zeno-agent_${goos}_${goarch}.zip" "zeno-agent_${goos}_${goarch}")
            else
              tar -C dist -czf "dist/zeno-agent_${goos}_${goarch}.tar.gz" "zeno-agent_${goos}_${goarch}"
            fi
          done
      - name: Generate artifact-specific Agent CycloneDX SBOMs
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0
          cyclonedx="$(go env GOPATH)/bin/cyclonedx-gomod"
          for target in linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            output="dist/zeno-agent_${goos}_${goarch}.cdx.json"
            if [ "$goarch" = "arm" ]; then
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" GOARM=6 "$cyclonedx" app -json -output "$output" -main cmd/zeno-agent .
            else
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" "$cyclonedx" app -json -output "$output" -main cmd/zeno-agent .
            fi
          done
      - name: Validate artifact-specific SBOM coverage
        run: |
          export SBOM_VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            export SBOM_VERSION="$GITHUB_REF_NAME"
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import parse_qs, urlsplit

          targets = [
              ("linux", "amd64"), ("linux", "arm64"), ("linux", "arm"),
              ("darwin", "amd64"), ("darwin", "arm64"),
              ("windows", "amd64"), ("windows", "arm64"),
          ]
          version = os.environ["SBOM_VERSION"]
          for goos, goarch in targets:
              path = Path(f"dist/zeno-agent_{goos}_{goarch}.cdx.json")
              document = json.loads(path.read_text())
              component = document["metadata"]["component"]
              if component.get("version") != version:
                  raise SystemExit(f"{path}: component version {component.get('version')!r} != {version!r}")
              query = parse_qs(urlsplit(component["purl"]).query)
              if query.get("goos") != [goos] or query.get("goarch") != [goarch]:
                  raise SystemExit(f"{path}: wrong target purl {component['purl']!r}")
              properties = {item.get("name"): item.get("value") for item in component.get("properties", [])}
              if properties.get("cdx:gomod:build:env:CGO_ENABLED") != "0":
                  raise SystemExit(f"{path}: CGO_ENABLED is not 0")
              names = {item.get("name") for item in document.get("components", [])}
              if goos in {"darwin", "windows"} and "golang.org/x/sys" not in names:
                  raise SystemExit(f"{path}: missing platform dependency golang.org/x/sys")
          PY
      - name: Generate release checksums
        run: (cd dist && sha256sum zeno-agent_*.tar.gz zeno-agent_*.zip zeno-agent_*.cdx.json > SHA256SUMS)
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        id: provenance
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Include offline-verifiable provenance bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: cp "${{ steps.provenance.outputs.bundle-path }}" dist/zeno-agent_provenance.sigstore.json
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/zeno-agent_*.cdx.json
            dist/zeno-agent_provenance.sigstore.json
