name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ''
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: '.exe'
            archive: zip
          - goos: windows
            goarch: arm64
            ext: '.exe'
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go test ./...
      - name: Build
        run: |
          mkdir -p dist/zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w" -o dist/zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }}/zeno-agent${{ matrix.ext }} ./cmd/zeno-agent
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }}.zip zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }})
          else
            tar -C dist -czf dist/zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz zeno-agent_${{ matrix.goos }}_${{ matrix.goarch }}
          fi
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
