name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.12'
          check-latest: true
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test -race ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: $(go env GOPATH)/bin/staticcheck ./...
      - run: bash -n install.sh
      - shell: pwsh
        run: '[void][scriptblock]::Create((Get-Content -Raw install.ps1))'
      - name: Build release assets
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          for target in linux/amd64 linux/arm64 linux/arm darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            ext=""
            archive="tar.gz"
            if [ "$goos" = "windows" ]; then
              ext=".exe"
              archive="zip"
            fi
            out_dir="dist/zeno-agent_${goos}_${goarch}"
            mkdir -p "$out_dir"
            if [ "$goarch" = "arm" ]; then
              # The single linux_arm asset is consumed by both armv6l and
              # armv7l installers. GOARM=6 is the compatible contract for both.
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" GOARM=6 go build -trimpath -ldflags "-s -w" -o "$out_dir/zeno-agent${ext}" ./cmd/zeno-agent
            else
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w" -o "$out_dir/zeno-agent${ext}" ./cmd/zeno-agent
            fi
            if [ "$archive" = "zip" ]; then
              (cd dist && zip -qr "zeno-agent_${goos}_${goarch}.zip" "zeno-agent_${goos}_${goarch}")
            else
              tar -C dist -czf "dist/zeno-agent_${goos}_${goarch}.tar.gz" "zeno-agent_${goos}_${goarch}"
            fi
          done
          (cd dist && sha256sum zeno-agent_*.tar.gz zeno-agent_*.zip > SHA256SUMS)
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        id: provenance
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Include offline-verifiable provenance bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: cp "${{ steps.provenance.outputs.bundle-path }}" dist/zeno-agent_provenance.sigstore.json
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/zeno-agent_provenance.sigstore.json
